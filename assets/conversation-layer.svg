<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-champagne" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#e8c97a" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="700" height="360" rx="12" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="699" height="359" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>

  <text x="350" y="36" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="11" font-weight="700" fill="#e8c97a" text-anchor="middle" letter-spacing="2">CONVERSATION SCOPE</text>
  <text x="350" y="58" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">The current exchange</text>
  <text x="350" y="76" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="11" fill="#8b949e" text-anchor="middle">Where you interact with the Project. Skills activate here through natural language.</text>

  <!-- Conversation Context box -->
  <rect x="40" y="100" width="620" height="120" rx="8" fill="#2a2415"/>
  <rect x="40" y="103" width="3" height="114" rx="1.5" fill="#e8c97a" opacity="0.7"/>
  <text x="350" y="124" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">Conversation Context</text>
  <text x="350" y="142" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="10.5" fill="#8b949e" text-anchor="middle">Active session state · message history · attached files · activated Skills</text>

  <line x1="80" y1="160" x2="620" y2="160" stroke="#5a4f30" stroke-width="0.5" opacity="0.6"/>

  <text x="350" y="180" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="9.5" font-weight="600" fill="#e8c97a" text-anchor="middle" letter-spacing="1.5">SUPPORTING SKILLS · ACTIVATE IN BACKGROUND</text>
  <text x="350" y="201" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="10.5" fill="#a08f5a" text-anchor="middle">block-selection  ·  identity-blocks  ·  reasoning-blocks  ·  output-blocks  ·  5 domain packs</text>

  <!-- Arrows down to bridge Skills -->
  <line x1="240" y1="226" x2="240" y2="262" stroke="#e8c97a" stroke-width="1.2" opacity="0.65" marker-end="url(#arrow-champagne)"/>
  <line x1="460" y1="226" x2="460" y2="262" stroke="#e8c97a" stroke-width="1.2" opacity="0.65" marker-end="url(#arrow-champagne)"/>

  <!-- Bridge Skill: project-brief -->
  <rect x="184" y="270" width="112" height="22" rx="11" fill="#3a311e" stroke="#5a4f30" stroke-width="0.8"/>
  <text x="240" y="285" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="11" font-weight="600" fill="#e8c97a" text-anchor="middle">project-brief</text>
  <text x="240" y="312" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="10" fill="#8b949e" text-anchor="middle">Cross-Project bridge</text>
  <text x="240" y="328" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="9.5" fill="#6e7681" text-anchor="middle">Captures Project context for use elsewhere</text>

  <!-- Bridge Skill: session-handoff -->
  <rect x="396" y="270" width="128" height="22" rx="11" fill="#3a311e" stroke="#5a4f30" stroke-width="0.8"/>
  <text x="460" y="285" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="11" font-weight="600" fill="#e8c97a" text-anchor="middle">session-handoff</text>
  <text x="460" y="312" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="10" fill="#8b949e" text-anchor="middle">Cross-Session continuity</text>
  <text x="460" y="328" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' font-size="9.5" fill="#6e7681" text-anchor="middle">Preserves work state across conversations</text>
